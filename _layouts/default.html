{% include head-inner.html %}

<body>
  <div class="">
    {% include headernav.html %}
    <div class="navbar-spacer" style="height: 100px;"></div>
    <style>@media (max-width: 767px) { .navbar-spacer { height: 70px !important; } }</style>

    {{ content }}

    {% include footer.html %}
  </div>
  <script src="https://cdn.rawgit.com/michalsnik/aos/2.1.1/dist/aos.js"></script>
  <script src="{{ site.baseurl }}/assets/js/simple-jekyll-search.min.js"></script>
  
  <!-- Navbar scripts -->
  <script src="{{ '/vendor/jquery/jquery.min.js' | relative_url }}"></script>
  <script src="{{ '/vendor/bootstrap/js/bootstrap.bundle.min.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/animation.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/custom.js' | relative_url }}"></script>

  <script>
    AOS.init({
      once: true
    });

    SimpleJekyllSearch({
      searchInput: document.getElementById('search-input'),
      resultsContainer: document.getElementById('results-container'),
      json: '{{ site.baseurl }}/materias.json',
      searchResultTemplate: '<li><a href="{permalink}">{title}</a></li>'
    })
  </script>
</body>

</html>
