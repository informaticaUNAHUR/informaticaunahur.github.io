<!DOCTYPE html>
<html lang="{{ site.lang | default: site.language | default: 'es' }}">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title | default: site.name }}{% endif %}</title>

  <!-- Fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="shortcut icon" href="{{ '/assets/img/favicon.png' | relative_url }}">
  <link rel="icon" href="{{ '/assets/img/favicon.png' | relative_url }}">

  <!-- CSS páginas interiores (cargado primero para que Bootstrap/templatemo lo pisen) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/the-grid-flexbox@2.0.1/css/the-grid.min.css">
  <link href="https://cdn.rawgit.com/michalsnik/aos/2.1.1/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ "/css/main.css" | prepend: site.baseurl }}">

  <!-- Bootstrap + templatemo AL FINAL — idéntico al home, pisa cualquier conflicto -->
  <link rel="stylesheet" href="{{ '/vendor/bootstrap/css/bootstrap.min.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/fontawesome.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/templatemo-digimedia-v3.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/animated.css' | relative_url }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{{ site.title | default: site.name }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:description" content="{{ site.description }}">
  <meta property="og:site_name" content="{{ site.title | default: site.name }}">
  <meta property="og:image" content="{{ '/assets/img/image.png' | absolute_url }}">
  <meta property="fb:app_id" content="1154262757941899">
  <meta property="fb:admins" content="100002787447461">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ site.title | default: site.name }}">
  <meta name="twitter:description" content="{{ site.description }}">
  <meta name="twitter:creator" content="{{ site.twitter_username }}">
  <meta name="twitter:image" content="{{ '/assets/img/image.png' | absolute_url }}">
</head>
