  - name: "novedades"
    label: "Página Novedades"
    label_singular: "Novedad"
    folder: "_novedades"
    media_folder: "/assets/uploads/images"
    public_folder: "/assets/uploads/images"
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    identifier_field: "title"
    fields:
      - label: "Layout"
        name: "layout"
        widget: "hidden"
        default: "novedad"

