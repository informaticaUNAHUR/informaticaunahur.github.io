# ==========================
# Site
# ==========================
title: "Informática UNAHUR"
email: informatica@unahur.edu.ar
description: "Carreras, materias, horarios y novedades del Instituto de Tecnología e Ingeniería - UNAHUR"

url: "https://informaticaunahur.github.io"
baseurl: ""

language: "es"
lang: "es"

color_theme: "#4db6ad"
color_text: "#fff"

# ==========================
# Build settings
# ==========================
markdown: kramdown

# IMPORTANTE: NO usar permalink global (rompe colecciones)
# permalink: /:title/

paginate: 5
paginate_path: "/page:num/"

sass:
  style: compressed

# ==========================
# Theme
# ==========================
remote_theme: gustavoquinalha/jekyll-help-center-theme

# ==========================
# Plugins
# ==========================
plugins:
  - jekyll-paginate
  - jekyll-remote-theme

# ==========================
# Collections
# ==========================
collections:
  banners:
    output: false

  carreras:
    output: true
    permalink: /:name/

  novedades:
    output: true
    permalink: /novedades/:slug/

  materias:
    output: true
    permalink: /materias/:name/

# ==========================
# Excluir sitio viejo del build principal
# ==========================
exclude:
  - vendor/bundle/

# ==========================
# Defaults (IMPORTANTE)
# asegura que las carreras usen layout page
# ==========================
defaults:
  - scope:
      path: ""
      type: "carreras"
    values:
      layout: "carrera"
  - scope:
      path: ""
      type: "novedades"
    values:
      layout: "novedad"
  - scope:
      path: ""
      type: "materias"
    values:
      layout: "post"
